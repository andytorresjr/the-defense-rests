<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Defense Rests — 3D Cinematic Edition</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/courtroom.css">
  <link rel="stylesheet" href="../styles/ui.css">
  <link rel="stylesheet" href="../styles/portraits.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
    { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    } }
  </script>
</head>
<body>
  <canvas id="court3d"></canvas>
  <div id="vignette"></div>

  <div id="app">

    <div id="screen-title" class="screen"></div>

    <div id="screen-generic" class="screen scrollable"></div>

    <div id="screen-court" class="screen">
      <div id="letterbox-top"></div>
      <div id="letterbox-bottom"></div>

      <header id="topbar">
        <span id="case-title">STATE v. DANIEL CROSS</span>
        <span id="phase-label"></span>
      </header>

      <!-- hidden 2D stage stubs: the shared controller mounts portraits here -->
      <div id="stage" class="stage-stub" aria-hidden="true">
        <div id="bench"><div id="judge-portrait" class="portrait small"></div></div>
        <div id="jury-box"><div class="plate">THE JURY</div></div>
        <div id="pros-table"><div id="prosecutor-portrait" class="portrait small"></div></div>
        <div id="def-table"><div id="defendant-portrait" class="portrait small"></div></div>
      </div>

      <div id="stand">
        <div id="witness-portrait" class="portrait big" aria-hidden="true"></div>
        <div id="witness-plate" class="plate"></div>
      </div>

      <div id="jury-strip" title="The jury — cool: with the defense, warm: with the State"></div>

      <div id="meters"></div>
      <div id="cue-toast" hidden></div>
      <div id="ruling-banner" hidden></div>

      <div id="dialogue">
        <div id="speaker"></div>
        <div id="dtext"></div>
        <button id="continueBtn" hidden>Continue ▸</button>
      </div>

      <div id="controls">
        <button id="objectBtn" hidden>OBJECT!</button>
        <div id="choices"></div>
        <button id="recordBtn" title="Exhibits and the facts on the record">Court Record</button>
      </div>
    </div>

    <div id="slam" hidden></div>
    <div id="modal-root" hidden></div>
    <div id="debug-overlay" hidden></div>
  </div>

  <a id="version-link" href="../">◀ Classic 2D edition</a>

  <script type="module" src="main.js"></script>
</body>
</html>
